<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Form</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .success {
            color: green;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Post</h2>

    <form id="form">
        <input type="text" id="title" placeholder="Enter Title" required>
        <textarea id="body" placeholder="Enter Body" required></textarea>
        <button type="submit">Submit</button>
    </form>

    <p class="success" id="msg">✅ Data submitted successfully!</p>
</div>

<script>
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        const data = {
            title: document.getElementById("title").value,
            body: document.getElementById("body").value
        };

        try {
            const res = await fetch("http://localhost:8080/addPost", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                msg.style.display = "block";
                form.reset();
            } else {
                alert("Failed to submit");
            }

        } catch (err) {
            console.error(err);
            alert("Server error");
        }
    });
</script>

</body>
</html>
